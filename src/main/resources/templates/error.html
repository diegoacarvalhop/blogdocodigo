<!DOCTYPE html>
<html layout:decorate="~{layout}">
<head>
<meta charset="UTF-8" />
</head>
<body>
	<section class="layout-content" layout:fragment="corpo">
		<div class="page-header">
			<nav class="navbar navbar-expand-md navbar-top bg-light">
				<div class="collapse navbar-collapse" id="navbarsExampleDefault">
					<ul class="navbar-nav">
						<li class="nav-item active"><i class="oi oi-caret-right"></i>
							<span>Erro</span></li>
					</ul>
				</div>
			</nav>
		</div>
		<div class="container" id="externa">
			<div id="interna">
				<h1 class="h3 mb-3 font-weight-normal">
					<i class="oi oi-warning"></i> <span th:text="${status}"></span>
				</h1>

				<h2 th:text="${error}"></h2>

				<div>
					<span th:text="${message}"></span><br /> <br /> <a
						class="btn btn-primary" type="button"
						href="javascript:history.back()"> <span class="oi oi-action-undo"
						title="Cadastro" aria-hidden="true"></span><span> Voltar
							para a página anterior</span></a>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
